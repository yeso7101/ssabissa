<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일정 캘린더 - 싸비싸</title>
    <link rel="stylesheet" as="style" crossorigin href="https://fastly.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root { --blue: #3b82f6; --text-main: #1e293b; --text-sub: #868e96; --border: #e2e8f0; --bg-gray: #f8fafc; --red: #ef4444;}
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-gray); margin: 0; padding-top: 90px; padding-bottom: 60px; box-sizing: border-box; color: var(--text-main); }
        .container { max-width: 600px; margin: 0 auto; padding: 0 16px; box-sizing: border-box; }

        .top-nav { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 500px; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 10px 20px; border-radius: 100px; box-shadow: 0 4px 20px rgba(59, 130, 246, 0.05); border: 1px solid rgba(255, 255, 255, 0.8); box-sizing: border-box; z-index: 1000; }
        .top-nav .nav-logo { text-decoration: none; color: var(--blue); font-weight: 800; font-size: 0.95rem; letter-spacing: -0.5px; }
        .top-nav .nav-links { display: flex; gap: 14px; align-items: center; }
        .top-nav a:not(.nav-logo) { text-decoration: none; color: #64748b; font-size: 0.8rem; font-weight: 600; transition: all 0.3s; }
        .top-nav a:not(.nav-logo):hover { color: var(--blue); }
        
        /* 🔍 검색창 (모달 띄우기 연동) */
        .page-search { position: relative; width: 100%; max-width: 400px; margin: 0 auto 10px auto; display: flex; align-items: center; }
        .page-search input { width: 100%; padding: 14px 45px 14px 20px; border-radius: 30px; border: 1.5px solid #cbd5e1; outline: none; font-size: 0.95rem; box-sizing: border-box; font-weight: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.02); transition: all 0.3s; }
        .page-search input:focus { border-color: var(--blue); box-shadow: 0 4px 20px rgba(59, 130, 246, 0.1); }
        .page-search button { position: absolute; right: 16px; background: var(--blue); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem; transition: transform 0.2s; }
        .page-search button:hover { transform: scale(1.05); }

        .tab-container { display: flex; margin-bottom: -1px; position: relative; z-index: 10; margin-top: 20px; }
        .tab-button { flex: 1; padding: 12px; text-align: center; font-weight: 700; font-size: 0.9rem; background-color: #f1f5f9; color: #64748b; border: 1px solid var(--border); border-bottom: none; border-top-left-radius: 12px; border-top-right-radius: 12px; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .tab-button.active { background-color: #ffffff; color: var(--blue); border-color: var(--border) var(--border) #ffffff; font-weight: 800; }
        
        .ranking-board { background: #ffffff; border: 1px solid var(--border); border-radius: 0 0 16px 16px; padding: 10px 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.03); margin-bottom: 25px; min-height: 250px; }
        
        .calendar-item { display: flex; align-items: center; padding: 14px 12px; border-bottom: 1px solid #f8fafc; transition: background 0.2s; }
        .calendar-item:hover { background-color: #f8fafc; border-radius: 8px; cursor: pointer; }
        .calendar-item:last-child { border-bottom: none; }
        
        .cal-date { font-weight: 900; color: var(--blue); font-size: 0.95rem; width: 55px; text-align: center; background: #eff6ff; padding: 6px; border-radius: 8px; flex-shrink: 0; }
        .cal-title { font-weight: 700; color: var(--text-main); font-size: 0.95rem; margin-left: 16px; line-height: 1.4; word-break: keep-all; }
        
        .empty-state { text-align: center; padding: 50px 20px; color: #94a3b8; font-size: 0.9rem; font-weight: 600; line-height: 1.5; }
        .loading-state { text-align: center; padding: 50px 20px; color: var(--blue); font-size: 0.95rem; font-weight: 700; }

        /* ✅ 1번: 하단 면책조항 텍스트 */
        .main-footer { text-align: center; margin-top: 30px; font-size: 0.75rem; color: #94a3b8; line-height: 1.6; font-weight: 400; padding-bottom: 20px; }

        /* ✅ 모달 UI */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; backdrop-filter: blur(4px); align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 90%; max-width: 400px; border-radius: 20px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); position: relative; max-height: 85vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 16px; right: 20px; cursor: pointer; font-size: 1.8rem; color: #94a3b8; background: none; border: none; padding: 0; line-height: 1; transition: color 0.2s; }
        .modal-close:hover { color: var(--text-main); }
        .m-score-circle { width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; color: white; margin: 10px auto 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .m-header { text-align: center; border-bottom: 1px solid #f1f3f5; padding-bottom: 16px; margin-bottom: 16px; }
        .m-name { font-size: 1.2rem; font-weight: 900; color: var(--text-main); margin-bottom: 4px; }
        .m-price { font-size: 1.05rem; color: var(--blue); font-weight: 800; }
        .m-brief { font-size: 0.9rem; font-weight: 700; color: var(--text-main); text-align: center; margin-bottom: 16px; line-height: 1.4; }
        .m-curation { background: #f8fafc; padding: 14px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; color: #334155; margin-bottom: 16px; line-height: 1.5; border: 1px solid #e2e8f0; }
        .m-reason-list { list-style: none; padding: 0; margin: 0; font-size: 0.85rem; margin-bottom: 20px;}
        .m-reason-item { padding: 8px 0; border-bottom: 1px dashed #f1f3f5; font-weight: 600; }
        .m-btn-detail { display: block; width: 100%; text-align: center; background: var(--blue); color: white; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 800; transition: transform 0.2s; box-sizing: border-box; font-size: 0.9rem;}
        .m-btn-detail:active { transform: scale(0.97); }
        .loading-spinner { text-align: center; padding: 40px; font-weight: 700; color: var(--blue); font-size: 1rem; }

        @media (max-width: 768px) {
            .top-nav { display: none !important; }
            body { padding-top: 20px; margin-bottom: 80px; }
            .mobile-sub-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 0 16px; height: 52px; border-radius: 100px; border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 4px 20px rgba(59, 130, 246, 0.08); justify-content: space-between; align-items: center; width: calc(100% - 32px); max-width: 400px; box-sizing: border-box; display: flex !important; z-index: 10000; }
            .mobile-sub-nav .nav-logo { text-decoration: none; color: var(--text-main) !important; font-weight: 800; font-size: 0.9rem; letter-spacing: -0.5px; }
            .mobile-sub-nav .nav-links { display: flex; gap: 6px; align-items: center; }
            .mobile-sub-nav a:not(.nav-logo) { text-decoration: none; color: #64748b; font-weight: 600; font-size: 0.75rem; padding: 6px 8px; transition: all 0.3s; background: transparent !important; }
            .mobile-sub-nav a:not(.nav-logo):hover { color: var(--blue); }
            .mobile-sub-nav a.active { color: var(--blue) !important; font-weight: 800; }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="/" class="nav-logo">🔍 홈</a>
        <div class="nav-links">
            <a href="/calendar" class="active">캘린더</a>
            <a href="/ranking">랭킹</a>
            <a href="/strategy">가이드</a>
            <a href="/about">소개</a>
            <a href="/privacy">약관</a>
        </div>
    </div>

    <div class="container">
        <form class="page-search" onsubmit="handleSearch(event)">
            <input type="text" id="searchInput" placeholder="종목명 또는 티커 검색..." required autocomplete="off">
            <button type="submit">🔍</button>
        </form>

        <div class="tab-container">
            <div id="tab-dividend" class="tab-button active" onclick="switchTab('dividend')">💰 배당락 일정</div>
            <div id="tab-earning" class="tab-button" onclick="switchTab('earning')">📊 실적발표 일정</div>
        </div>

        <div id="dividend-board" class="ranking-board">
            <div class="loading-state">데이터를 불러오는 중입니다...</div>
        </div>

        <div id="earning-board" class="ranking-board" style="display: none;">
            <div class="loading-state">데이터를 불러오는 중입니다...</div>
        </div>
        
        <div class="main-footer">
            © 2026 SSABISSA. All rights reserved.<br>
            본 서비스의 진단 점수 및 큐레이션은 투자 참고용이며,<br>
            실제 투자 결과에 대한 법적 책임을 지지 않습니다.
        </div>
    </div>

    <div id="diagnoseModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modalBody">
                <div class="loading-spinner">데이터를 불러오는 중입니다... ⏳</div>
            </div>
        </div>
    </div>

    <div class="mobile-sub-nav" style="display: none;">
        <a href="/" class="nav-logo">🔍 홈</a>
        <div class="nav-links">
            <a href="/calendar" class="active">캘린더</a>
            <a href="/ranking">랭킹</a>
            <a href="/strategy">가이드</a>
            <a href="/about">소개</a>
            <a href="/privacy">약관</a>
        </div>
    </div>

   <script>
    function switchTab(type) {
        const tabDiv = document.getElementById('tab-dividend'); const tabEarn = document.getElementById('tab-earning');
        const divBoard = document.getElementById('dividend-board'); const earnBoard = document.getElementById('earning-board');
        if (type === 'dividend') {
            tabDiv.classList.add('active'); tabEarn.classList.remove('active');
            divBoard.style.display = 'block'; earnBoard.style.display = 'none';
        } else {
            tabDiv.classList.remove('active'); tabEarn.classList.add('active');
            divBoard.style.display = 'none'; earnBoard.style.display = 'block';
        }
    }

    function formatDate(dateStr) {
        const parts = dateStr.split('-');
        if(parts.length === 3) return parseInt(parts[1], 10) + '/' + parseInt(parts[2], 10);
        return dateStr;
    }

    function renderList(boardId, items, typeName) {
        const board = document.getElementById(boardId);
        board.innerHTML = '';
        if (!items || items.length === 0) {
            board.innerHTML = `<div class="empty-state">현재 다가오는 ${typeName} 일정이<br>파악되지 않았습니다.</div>`;
            return;
        }

        items.forEach(item => {
            const row = document.createElement('div');
            row.className = 'calendar-item';
            const displayDate = formatDate(item.date);
            
            row.innerHTML = `
                <div class="cal-date">${displayDate}</div>
                <div class="cal-title">${item.title}</div>
            `;
            
            // ✅ [AAPL] 정규식으로 티커 추출하여 모달 클릭 이벤트 연결
            const match = item.title.match(/\[(.*?)\]/);
            if(match && match[1]) {
                row.onclick = () => openModal(match[1]);
            }
            board.appendChild(row);
        });
    }

    async function loadCalendarData() {
        try {
            const response = await fetch('/api/calendar/data');
            const data = await response.json();
            renderList('dividend-board', data.dividend, '배당락');
            renderList('earning-board', data.earning, '실적발표');
        } catch (error) {
            document.getElementById('dividend-board').innerHTML = '<div class="empty-state">데이터를 불러오는데 실패했습니다.</div>';
            document.getElementById('earning-board').innerHTML = '<div class="empty-state">데이터를 불러오는데 실패했습니다.</div>';
        }
    }

    // ✅ 검색창 제출 시 모달 띄우기
    function handleSearch(e) {
        e.preventDefault(); 
        const query = document.getElementById('searchInput').value.trim();
        if(!query) return;
        openModal(query);
    }

    // ✅ 모달 렌더링 함수
    function openModal(ticker) {
        const modal = document.getElementById('diagnoseModal');
        const body = document.getElementById('modalBody');
        modal.style.display = 'flex';
        body.innerHTML = '<div class="loading-spinner">진단 중입니다... ⏳</div>';

        fetch(`/api/diagnose/${ticker}`)
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    body.innerHTML = `<div style="text-align:center; padding: 30px; color: var(--red); font-weight:800;">${data.error}</div>`;
                    return;
                }
                
                let reasonsHtml = '';
                if (data.reasons && data.reasons.length > 0) {
                    data.reasons.forEach(r => {
                        let color = 'var(--text-main)';
                        if(r.startsWith('+')) color = 'var(--red)';
                        if(r.startsWith('-')) color = 'var(--blue)';
                        reasonsHtml += `<li class="m-reason-item" style="color:${color}">${r}</li>`;
                    });
                } else {
                    reasonsHtml = `<li class="m-reason-item" style="color: #94a3b8; text-align:center;">특이 평가 항목이 없습니다.</li>`;
                }

                body.innerHTML = `
                    <div class="m-header">
                        <div class="m-name">${data.name} <span style="font-size:0.8rem; color:#868e96; font-weight:600;">${data.ticker}</span></div>
                        <div class="m-price">${data.current_price}</div>
                    </div>
                    <div class="m-score-circle" style="background-color: ${data.color};">${data.score}</div>
                    <div class="m-brief">${data.brief}</div>
                    <div class="m-curation">🤖 ${data.curation_reason}</div>
                    <ul class="m-reason-list">${reasonsHtml}</ul>
                    <a href="/?ticker=${data.ticker}" class="m-btn-detail">📊 전체 차트 및 주주 커뮤니티 보기</a>
                `;
            })
            .catch(err => {
                body.innerHTML = `<div style="text-align:center; padding: 30px; color: var(--red); font-weight:800;">통신 오류가 발생했습니다.</div>`;
            });
    }

    function closeModal() { document.getElementById('diagnoseModal').style.display = 'none'; }
    window.onclick = function(event) { if (event.target == document.getElementById('diagnoseModal')) closeModal(); }

    document.addEventListener('DOMContentLoaded', loadCalendarData);
   </script>
</body>
</html>
