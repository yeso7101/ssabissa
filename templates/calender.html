<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>증시 주요 일정 - 싸비싸</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8149587000580969" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" as="style" crossorigin href="https://fastly.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    
    <style>
        :root {
            --blue: #3b82f6;
            --text-main: #1e293b;
            --text-sub: #868e96;
            --border: #e2e8f0;
            --bg-gray: #f8fafc;
            --red: #ef4444;
            --green: #22c55e;
            --orange: #f97316;
        }
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; 
            padding-top: 90px; 
            padding-bottom: 80px; 
            box-sizing: border-box; 
            color: var(--text-main); 
            
            /* 가독성 최적화 세팅 */
            word-break: keep-all; 
            overflow-wrap: break-word;
            line-height: 1.65;
            text-align: justify;
        }
        
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 0 16px; 
            box-sizing: border-box; 
        }

        /* 🖥️ 데스크탑 상단 네비게이션 */
        .top-nav { 
            position: fixed; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: calc(100% - 32px); 
            max-width: 500px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            padding: 10px 20px; 
            border-radius: 100px; 
            border: 1px solid rgba(255, 255, 255, 0.8); 
            box-sizing: border-box; 
            z-index: 1000; 
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.4); 
        }
        
        .nav-logo.ssb-logo {
            font-size: 26px;
            font-weight: 900;
            color: #ffffff;
            text-decoration: none;
            letter-spacing: -1px;
            text-shadow: 1px 1px 0 #0f172a, 2px 2px 0 #0f172a, 3px 3px 0 #0f172a, 4px 4px 0 #0f172a, 5px 5px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            margin-right: 10px;
        }
        
        .top-nav .nav-links { display: flex; gap: 14px; align-items: center; }
        .top-nav a:not(.nav-logo) { text-decoration: none; color: #64748b; font-size: 0.8rem; font-weight: 600; transition: all 0.3s; }
        .top-nav a:not(.nav-logo):hover { color: var(--blue); }
        .top-nav a.active { color: var(--blue); font-weight: 800; }

        .dropdown { position: relative; display: flex; align-items: center; }
        .dropbtn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; transition: stroke 0.2s; }
        .dropbtn:hover svg { stroke: var(--blue); }
        .dropdown-content { 
            display: none; position: absolute; right: 0; top: 38px; 
            background-color: rgba(255, 255, 255, 0.95); min-width: 120px; 
            box-shadow: 2px 2px 8px rgba(0,0,0,0.2); border-radius: 12px; 
            overflow: hidden; z-index: 1001; flex-direction: column; 
            border: 1px solid var(--border);
        }
        .dropdown-content.show { display: flex; }
        .dropdown-content a { padding: 12px 16px; text-decoration: none; display: block; text-align: center; color: #475569 !important; font-size: 0.85rem !important; font-weight: 700 !important; }
        .dropdown-content a:hover { background-color: #f1f5f9; color: var(--blue) !important; }

        /* 🔍 검색창 스타일 */
        .main-search-wrapper { 
            margin-bottom: 24px; 
        }
        .page-search { 
            position: relative; 
            width: 100%; 
            display: flex; 
            align-items: center; 
        }
        .page-search input { 
            width: 100%; 
            padding: 14px 45px 14px 20px; 
            border-radius: 30px; 
            border: 1.5px solid #cbd5e1; 
            outline: none; 
            font-size: 0.95rem; 
            box-sizing: border-box; 
            font-weight: 600; 
            transition: all 0.3s; 
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.4); 
        }
        .page-search input:focus { 
            border-color: var(--blue); 
            box-shadow: 2px 2px 8px rgba(59, 130, 246, 0.5); 
        }
        .page-search button { 
            position: absolute; 
            right: 12px; 
            background: transparent; 
            border: none; 
            width: 32px; 
            height: 32px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: transform 0.2s; 
        }
        .page-search button:hover { 
            transform: scale(1.1); 
        }

        /* 📊 카드 UI */
        .card { 
            background: white; 
            border-radius: 16px; 
            padding: 20px; 
            margin-bottom: 16px; 
            border: 1px solid var(--border); 
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.4); 
        }

        /* 📅 달력 그리드 타임라인 UI */
        .timeline-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .timeline-day-card {
            background: white;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .day-header {
            background: #f1f5f9;
            padding: 12px 20px;
            font-weight: 800;
            font-size: 1rem;
            color: var(--text-main);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .event-item {
            padding: 14px 20px;
            border-bottom: 1px solid #f8fafc;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .event-item:hover {
            background-color: #f8fafc;
        }
        .event-item:last-child {
            border-bottom: none;
        }
        
        .event-meta-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex: 1;
        }
        
        .event-badge {
            font-size: 0.75rem;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 6px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .badge-dividend { background-color: #fee2e2; color: var(--red); }
        .badge-earnings { background-color: #ffedd5; color: var(--orange); }
        
        .event-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .event-desc {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-sub);
            margin-top: 2px;
        }
        
        .empty-msg {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-sub);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .main-footer { 
            text-align: center; 
            margin-top: 40px; 
            font-size: 0.8rem; 
            color: #94a3b8; 
            font-weight: 500; 
            padding-bottom: 20px; 
        }

        /* 📱 모바일 하단 네비게이션 */
        @media (max-width: 768px) {
            .top-nav { display: none !important; }
            body { padding-top: 20px; }
            
            .nav-logo.ssb-logo {
                font-size: 20px;
                text-shadow: 1px 1px 0 #0f172a, 2px 2px 0 #0f172a, 3px 3px 0 #0f172a, 4px 4px 4px rgba(0, 0, 0, 0.3);
            }
            
            .mobile-sub-nav { 
                position: fixed; 
                bottom: 20px; 
                left: 50%; 
                transform: translateX(-50%); 
                background: rgba(255, 255, 255, 0.8); 
                backdrop-filter: blur(12px); 
                -webkit-backdrop-filter: blur(12px); 
                padding: 0 16px; 
                height: 52px; 
                border-radius: 100px; 
                border: 1px solid rgba(255, 255, 255, 0.9); 
                justify-content: space-between; 
                align-items: center; 
                width: calc(100% - 32px); 
                max-width: 400px; 
                box-sizing: border-box; 
                display: flex !important; 
                z-index: 900; 
                box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.4); 
            }
            .mobile-sub-nav .nav-logo { text-decoration: none; display: flex; align-items: center; }
            .mobile-sub-nav .nav-links { display: flex; gap: 6px; align-items: center; }
            .mobile-sub-nav a:not(.nav-logo) { text-decoration: none; color: #64748b; font-weight: 600; font-size: 0.75rem; padding: 6px 8px; transition: all 0.3s; }
            .mobile-sub-nav a:not(.nav-logo):hover { color: var(--blue); }
            .mobile-sub-nav a.active { color: var(--blue) !important; font-weight: 800; }
            .m-dropdown .dropdown-content { top: auto; bottom: 50px; right: -5px; }
        }

        /* 팝업 모달 UI 공통 양식 */
        .modal-overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.5); 
            z-index: 9999; 
            backdrop-filter: blur(4px); 
            align-items: center; 
            justify-content: center; 
        }
        .modal-content { 
            background: #fff; 
            width: 90%; 
            max-width: 400px; 
            border-radius: 20px; 
            padding: 24px; 
            box-shadow: 2px 2px 10px rgba(0,0,0,0.4); 
            position: relative; 
            max-height: 85vh; 
            overflow-y: auto; 
        }
        .modal-close { 
            position: absolute; 
            top: 16px; 
            right: 20px; 
            cursor: pointer; 
            font-size: 1.8rem; 
            color: #94a3b8; 
            background: none; 
            border: none; 
            padding: 0; 
            line-height: 1; 
            transition: color 0.2s; 
            z-index: 2;
        }
        .modal-close:hover { color: var(--text-main); }
        
        .m-score-circle { 
            width: 90px; 
            height: 90px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 2rem; 
            font-weight: 900; 
            color: white; 
            margin: 10px auto 20px auto; 
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.4); 
            flex-shrink: 0 !important;
        }
        .m-header { 
            display: flex; 
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid #f1f3f5; 
            padding-bottom: 16px; 
            margin-bottom: 16px; 
        }
        .m-header-left {
            flex: 1;
            text-align: left;
            min-width: 0;
            padding-right: 20px;
        }
        .m-name { 
            font-size: 1.2rem; 
            font-weight: 900; 
            color: var(--text-main); 
            margin-bottom: 4px; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .m-price { 
            font-size: 1.05rem; 
            color: var(--blue); 
            font-weight: 800; 
            display: flex;
            align-items: center;
        }
        
        .fav-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .fav-btn:hover { transform: scale(1.1); }
        .fav-btn:active { transform: scale(0.9); }
        .fav-icon {
            width: 26px; height: 26px;
            fill: none; 
            stroke: #fbbf24;
            stroke-width: 2;
            transition: all 0.2s;
        }
        .fav-icon.active {
            fill: #fbbf24 !important; 
        }

        .m-brief { font-size: 0.9rem; font-weight: 700; color: var(--text-main); text-align: center; margin-bottom: 16px; }
        .m-curation { 
            background: #f8fafc; 
            padding: 14px; 
            border-radius: 12px; 
            font-size: 0.85rem; 
            font-weight: 600; 
            color: #334155; 
            margin-bottom: 16px; 
            border: 1px solid #e2e8f0; 
        }
        .m-reason-list { list-style: none; padding: 0; margin: 0; font-size: 0.85rem; margin-bottom: 20px;}
        .m-reason-item { padding: 8px 0; border-bottom: 1px dashed #f1f3f5; font-weight: 600; display: flex; align-items: flex-start; gap: 6px; }
        .m-btn-detail { 
            display: block; 
            width: 100%; 
            text-align: center; 
            background: var(--blue); 
            color: white; 
            padding: 14px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: 800; 
            transition: transform 0.2s; 
            box-sizing: border-box; 
            font-size: 0.9rem;
        }
        .m-btn-detail:active { transform: scale(0.97); }
        
        .score-change { 
            font-size: 0.85rem; 
            font-weight: 600; 
            padding: 4px 10px; 
            border-radius: 20px; 
            background: #f1f5f9; 
            color: #475569; 
        }
        .change-up { color: var(--red); font-weight: 700; }
        .change-down { color: var(--blue); font-weight: 700; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="/" class="nav-logo ssb-logo">SSB.</a>
        <div class="nav-links">
            <a href="/favorites">관심</a> <a href="/ranking">랭킹</a>
            <div class="dropdown">
                <button class="dropbtn" onclick="toggleDesktopMenu(event)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="dropdown-content" id="desktopMenu">
                    <a href="/calendar">캘린더</a>
                    <a href="/strategy">가이드</a>
                    <a href="/faq">FAQ</a>
                    <a href="/about">소개</a>
                    <a href="/privacy">약관</a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="main-search-wrapper">
            <form class="page-search" onsubmit="handleSearchSubmit(event)">
                <input type="text" id="searchInput" placeholder="종목명 또는 티커 (예: 삼성전자, AAPL)" required autocomplete="off">
                <button type="submit">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </form>
        </div>
        
        <h2 style="margin-top: 0; font-weight: 900; color: var(--text-main); font-size: 1.4rem; padding-left: 4px; display: flex; align-items: center; gap: 8px; margin-bottom: 20px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2.5">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            글로벌 증시 타임라인
        </h2>

        <div id="calendarTimelineContainer" class="timeline-container">
            <div class="loading-spinner">주요 기업 일정을 동기화하는 중입니다... ⏳</div>
        </div>

        <div class="main-footer">
            © 2026 SSABISSA. All rights reserved.<br>
            싸비싸의 진단 점수 및 큐레이션은 투자 판단을 위한 보조 지표이며,<br>
            모든 투자의 책임은 전적으로 투자자 본인에게 있습니다.
        </div>
    </div>

    <div id="diagnoseModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modalBody">
                <div class="loading-spinner">데이터를 불러오는 중입니다... ⏳</div>
            </div>
        </div>
    </div>

    <div class="mobile-sub-nav" style="display: none;">
        <a href="/" class="nav-logo ssb-logo">SSB.</a>
        <div class="nav-links">
            <a href="/favorites">관심</a> <a href="/ranking">랭킹</a>
            
            <div class="dropdown m-dropdown">
                <button class="dropbtn" onclick="toggleMobileMenu(event)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="dropdown-content" id="mobileMenu">
                    <a href="/calendar">캘린더</a>
                    <a href="/strategy">가이드</a>
                    <a href="/faq">FAQ</a>
                    <a href="/about">소개</a>
                    <a href="/privacy">약관</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleDesktopMenu(e) { e.preventDefault(); document.getElementById("desktopMenu").classList.toggle("show"); document.getElementById("mobileMenu").classList.remove("show"); }
        function toggleMobileMenu(e) { e.preventDefault(); document.getElementById("mobileMenu").classList.toggle("show"); document.getElementById("desktopMenu").classList.remove("show"); }
        window.onclick = function(event) { 
            if (!event.target.closest('.dropbtn')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) openDropdown.classList.remove('show');
                }
            }
            if (event.target == document.getElementById('diagnoseModal')) closeModal(); 
        }

        function handleSearchSubmit(e) {
            e.preventDefault();
            const query = document.getElementById('searchInput').value.trim();
            if(query) openModal(query);
        }

        function getFavorites() {
            return JSON.parse(localStorage.getItem('ssabissa_favorites')) || [];
        }

        // [4번 수정] 모달 내부 관심 토글 동작 시 10개 상한선 체크 디펜스 주입
        function toggleFavorite(ticker) {
            let favs = getFavorites();
            if (favs.includes(ticker)) {
                favs = favs.filter(t => t !== ticker);
            } else {
                if (favs.length >= 10) {
                    alert("⚠️ 관심 종목은 최대 10개까지만 등록할 수 있습니다. 기존에 저장한 종목을 해제한 후 다시 시도해 주세요.");
                    return;
                }
                favs.push(ticker);
            }
            localStorage.setItem('ssabissa_favorites', JSON.stringify(favs));
            updateFavoriteUI(ticker);
        }

        // [2번 수정] 모달창 관심 별표 활성화 투명도/색상 실시간 반사
        function updateFavoriteUI(ticker) {
            const favs = getFavorites();
            const isActive = favs.includes(ticker);
            
            const modalIcon = document.getElementById('favBtnModal_icon');
            if (modalIcon && modalIcon.getAttribute('data-ticker') === ticker) {
                if (isActive) modalIcon.classList.add('active');
                else modalIcon.classList.remove('active');
            }
        }

        // [1번 수정] 일정 페이지 내 리스트 클릭 시 상세 비동기 진단 결과 팝업 호출 브릿지 구현
        function openModal(ticker) {
            if(!ticker) return;
            const modal = document.getElementById('diagnoseModal');
            const body = document.getElementById('modalBody');
            modal.style.display = 'flex';
            body.innerHTML = '<div class="loading-spinner">진단 중입니다... ⏳</div>';

            fetch(`/api/diagnose/${ticker}`)
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        body.innerHTML = `<div style="text-align:center; padding: 30px; color: var(--red); font-weight:800;">${data.error}</div>`;
                        return;
                    }
                    
                    let reasonsHtml = '';
                    if (data.reasons && data.reasons.length > 0) {
                        data.reasons.forEach(r => {
                            let color = 'var(--text-main)';
                            if(r.startsWith('+')) color = 'var(--red)';
                            if(r.startsWith('-')) color = 'var(--blue)';
                            reasonsHtml += `<li class="m-reason-item" style="color:${color}"><span>💡</span>${r}</li>`;
                        });
                    } else {
                        reasonsHtml = `<li class="m-reason-item" style="color: #94a3b8; text-align:center;">특이 평가 항목이 없습니다.</li>`;
                    }

                    let changeHtml = '';
                    if (data.score_change > 0) {
                        changeHtml = `<span class="change-up">▲ ${data.score_change}</span>`;
                    } else if (data.score_change < 0) {
                        changeHtml = `<span class="change-down">▼ ${data.score_change * -1}</span>`;
                    } else {
                        changeHtml = `<span>-</span>`;
                    }

                    const isFav = getFavorites().includes(data.ticker);
                    const favClass = isFav ? 'active' : '';

                    body.innerHTML = `
                        <div class="m-header">
                            <div class="m-header-left">
                                <div class="m-name">${data.name} <span style="font-size:0.8rem; color:#868e96; font-weight:600;">${data.ticker}</span></div>
                                <div class="m-price">
                                    ${data.current_price}
                                    <button class="fav-btn" onclick="toggleFavorite('${data.ticker}')">
                                        <svg id="favBtnModal_icon" data-ticker="${data.ticker}" class="fav-icon ${favClass}" viewBox="0 0 24 24">
                                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="m-score-circle" style="background-color: ${data.color};">${data.score}</div>
                        <div style="display:flex; justify-content:center; margin-bottom:16px;">
                            <div class="score-change">어제 대비 ${changeHtml}</div>
                        </div>
                        <div class="m-brief">${data.brief}</div>
                        <div class="m-curation">🤖 ${data.curation_reason}</div>
                        <ul class="m-reason-list">${reasonsHtml}</ul>
                        <a href="/?ticker=${data.ticker}" class="m-btn-detail">📊 전체 차트 및 주주 커뮤니티 보기</a>
                    `;
                })
                .catch(err => {
                    body.innerHTML = `<div style="text-align:center; padding: 30px; color: var(--red); font-weight:800;">통신 오류가 발생했습니다.</div>`;
                });
        }

        function closeModal() { 
            document.getElementById('diagnoseModal').style.display = 'none'; 
        }

        let globalEvents = {};

        function renderCalendar() {
            const container = document.getElementById('calendarTimelineContainer');
            container.innerHTML = '';

            if (Object.keys(globalEvents).length === 0) {
                container.innerHTML = '<div class="empty-msg card">현재 수집된 글로벌 주요 증시 일정이 없습니다.</div>';
                return;
            }

            const sortedDates = Object.keys(globalEvents).sort();

            sortedDates.forEach(dateStr => {
                const dayCard = document.createElement('div');
                dayCard.className = 'timeline-day-card';

                const displayDate = '20' + dateStr; 
                let headerHtml = `<div class="day-header"><span>📅 ${displayDate}</span></div>`;
                dayCard.innerHTML = headerHtml;

                globalEvents[dateStr].forEach(ev => {
                    const itemRow = document.createElement('div');
                    itemRow.className = 'event-item';
                    itemRow.onclick = function() { openModal(ev.ticker); };

                    itemRow.innerHTML = `
                        <div class="event-meta-left">
                            <span class="event-badge badge-${ev.type}">${ev.type_name}</span>
                            <div style="min-width:0; flex:1;">
                                <div class="event-title">${ev.title}</div>
                                <div class="event-desc">${ev.description}</div>
                            </div>
                        </div>
                        <div style="font-size:0.75rem; font-weight:700; color:var(--blue); flex-shrink:0;">진단 스코어 ➔</div>
                    `;
                    dayCard.appendChild(itemRow);
                });

                container.appendChild(dayCard);
            });
        }

        async function loadCalendarData() {
            const container = document.getElementById('calendarTimelineContainer');
            try {
                const res = await fetch('/api/calendar/data');
                const data = await res.json();

                globalEvents = {};

                if (data.dividend) {
                    data.dividend.forEach(item => {
                        if (!globalEvents[item.date]) globalEvents[item.date] = [];
                        const ticker = item.title.match(/\[(.*?)\]/)?.[1] || '';
                        globalEvents[item.date].push({
                            time: '종일',
                            title: item.title,
                            description: '배당락일 (해당일 전까지 매수 필요)',
                            type: 'dividend',
                            type_name: '배당락일',
                            ticker: ticker
                        });
                    });
                }
                if (data.earning) {
                    data.earning.forEach(item => {
                        if (!globalEvents[item.date]) globalEvents[item.date] = [];
                        const ticker = item.title.match(/\[(.*?)\]/)?.[1] || '';
                        globalEvents[item.date].push({
                            time: '발표일',
                            title: item.title,
                            description: '기업 실적 발표 (예정)',
                            type: 'earnings',
                            type_name: '실적발표',
                            ticker: ticker
                        });
                    });
                }
                
                renderCalendar();

            } catch (e) {
                container.innerHTML = '<div class="empty-msg card" style="color: var(--red);">데이터 통신 오류가 발생했습니다.</div>';
            }
        }
        
        document.addEventListener("DOMContentLoaded", loadCalendarData);
    </script>
</body>
</html>
