\<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>증시 캘린더 - 싸비싸</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://fastly.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root { --blue: #3b82f6; --text-main: #1e293b; --text-sub: #868e96; --border: #e2e8f0; --bg-gray: #f8fafc; --red: #ef4444; }
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; 
            padding-top: 90px; 
            padding-bottom: 60px; 
            box-sizing: border-box; 
            color: var(--text-main); 
            /* ✅ 전역 가독성 개선: 단어 단위 줄바꿈 및 줄 간격 확보 */
            word-break: keep-all; 
            line-height: 1.6;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 0 16px; box-sizing: border-box; }

        /* ✅ 상단 네비게이션 */
        .top-nav { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 500px; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 10px 20px; border-radius: 100px; border: 1px solid rgba(255, 255, 255, 0.8); box-sizing: border-box; z-index: 1000; box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.4); }
        .top-nav .nav-logo { text-decoration: none; color: #64748b; font-weight: 800; font-size: 0.95rem; letter-spacing: -0.5px; display: flex; align-items: center; }
        .top-nav .nav-logo:hover { color: #475569; }
        .top-nav .nav-links { display: flex; gap: 14px; align-items: center; }
        .top-nav a:not(.nav-logo) { text-decoration: none; color: #64748b; font-size: 0.8rem; font-weight: 600; transition: all 0.3s; }
        .top-nav a:not(.nav-logo):hover { color: var(--blue); }
        .top-nav a.active { color: var(--blue); font-weight: 800; }

        /* ✅ 드롭다운 (햄버거 메뉴) */
        .dropdown { position: relative; display: flex; align-items: center; }
        .dropbtn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; transition: stroke 0.2s; }
        .dropbtn:hover svg { stroke: var(--blue); }
        .dropdown-content { display: none; position: absolute; right: 0; top: 38px; background-color: rgba(255, 255, 255, 0.95); min-width: 120px; box-shadow: 2px 2px 8px rgba(0,0,0,0.2); border-radius: 12px; overflow: hidden; z-index: 1001; flex-direction: column; border: 1px solid var(--border); }
        .dropdown-content.show { display: flex; }
        .dropdown-content a { padding: 12px 16px; text-decoration: none; display: block; text-align: center; color: #475569 !important; font-size: 0.85rem !important; font-weight: 700 !important; }
        .dropdown-content a:hover { background-color: #f1f5f9; color: var(--blue) !important; }
        
        /* 🔍 검색창 */
        .page-search { position: relative; width: 100%; max-width: 400px; margin: 0 auto 20px auto; display: flex; align-items: center; }
        .page-search input { width: 100%; padding: 14px 45px 14px 20px; border-radius: 30px; border: 1.5px solid #cbd5e1; outline: none; font-size: 0.95rem; box-sizing: border-box; font-weight: 600; transition: all 0.3s; box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.4); }
        .page-search input:focus { border-color: var(--blue); box-shadow: 2px 2px 8px rgba(59, 130, 246, 0.5); }
        .page-search button { position: absolute; right: 12px; background: transparent; border: none; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s; }
        .page-search button:hover { transform: scale(1.1); }

        /* 📅 캘린더 전용 스타일 */
        .calendar-hero { text-align: center; padding: 25px 20px; background: white; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.4); }
        .calendar-hero h1 { color: var(--blue); margin-top: 0; margin-bottom: 10px; font-size: 1.4rem; font-weight: 900; letter-spacing: -0.5px; }
        .calendar-hero p { color: #475569; font-size: 0.9rem; line-height: 1.5; margin: 0; font-weight: 600; }

        .tab-container { display: flex; margin-bottom: -1px; position: relative; z-index: 10; margin-top: 10px; }
        .tab-button { flex: 1; padding: 12px; text-align: center; font-weight: 700; font-size: 0.9rem; background-color: #f1f5f9; color: #64748b; border: 1px solid var(--border); border-bottom: none; border-top-left-radius: 12px; border-top-right-radius: 12px; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .tab-button.active { background-color: #ffffff; color: var(--blue); border-color: var(--border) var(--border) #ffffff; font-weight: 800; }
        
        .calendar-board { background: #ffffff; border: 1px solid var(--border); border-radius: 0 0 16px 16px; padding: 10px 16px; margin-bottom: 25px; box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.4); min-height: 250px; }
        .event-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 12px; border-bottom: 1px dashed #f1f5f9; transition: background 0.2s; border-radius: 8px;}
        .event-item:hover { background-color: #f8fafc; cursor: pointer;}
        .event-item:last-child { border-bottom: none; }
        .event-date { font-weight: 900; color: var(--blue); width: 85px; flex-shrink: 0; font-size: 0.95rem; }
        .event-title { font-weight: 600; color: var(--text-main); font-size: 0.9rem; flex-grow: 1; text-align: right; }

        .main-footer { text-align: center; margin-top: 30px; font-size: 0.75rem; color: #94a3b8; line-height: 1.6; font-weight: 400; padding-bottom: 20px; }

        /* ✅ 모달 UI */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; backdrop-filter: blur(4px); align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 90%; max-width: 400px; border-radius: 20px; padding: 24px; position: relative; max-height: 85vh; overflow-y: auto; box-shadow: 2px 2px 10px rgba(0,0,0,0.4); }
        .modal-close { position: absolute; top: 16px; right: 20px; cursor: pointer; font-size: 1.8rem; color: #94a3b8; background: none; border: none; padding: 0; line-height: 1; transition: color 0.2s; }
        .modal-close:hover { color: var(--text-main); }
        .m-score-circle { width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; color: white; margin: 10px auto 20px auto; box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.4); }
        
        .score-change { font-size: 0.85rem; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: #f1f5f9; color: #475569; display: inline-block; }
        .change-up { color: var(--red); font-weight: 700; }
        .change-down { color: var(--blue); font-weight: 700; }

        .m-header { text-align: center; border-bottom: 1px solid #f1f3f5; padding-bottom: 16px; margin-bottom: 16px; }
        .m-name { font-size: 1.2rem; font-weight: 900; color: var(--text-main); margin-bottom: 4px; }
        .m-price { font-size: 1.05rem; color: var(--blue); font-weight: 800; }
        .m-brief { font-size: 0.9rem; font-weight: 700; color: var(--text-main); text-align: center; margin-bottom: 16px; line-height: 1.4; }
        .m-curation { background: #f8fafc; padding: 14px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; color: #334155; margin-bottom: 16px; line-height: 1.5; border: 1px solid #e2e8f0; }
        .m-reason-list { list-style: none; padding: 0; margin: 0; font-size: 0.85rem; margin-bottom: 20px;}
        .m-reason-item { padding: 8px 0; border-bottom: 1px dashed #f1f3f5; font-weight: 600; }
        .m-btn-detail { display: block; width: 100%; text-align: center; background: var(--blue); color: white; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 800; transition: transform 0.2s; box-sizing: border-box; font-size: 0.9rem;}
        .m-btn-detail:active { transform: scale(0.97); }
        .loading-spinner { text-align: center; padding: 40px; font-weight: 700; color: var(--blue); font-size: 1rem; }

        /* ✅ 모바일 하단 네비게이션 */
        @media (max-width: 768px) {
            .top-nav { display: none !important; }
            body { padding-top: 20px; margin-bottom: 80px; }
            .mobile-sub-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 0 16px; height: 52px; border-radius: 100px; border: 1px solid rgba(255, 255, 255, 0.9); justify-content: space-between; align-items: center; width: calc(100% - 32px); max-width: 400px; box-sizing: border-box; display: flex !important; z-index: 900; box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.4); }
            .mobile-sub-nav .nav-logo { text-decoration: none; color: #64748b !important; font-weight: 800; font-size: 0.9rem; letter-spacing: -0.5px; display: flex; align-items: center; }
            .mobile-sub-nav .nav-links { display: flex; gap: 6px; align-items: center; }
            .mobile-sub-nav a:not(.nav-logo) { text-decoration: none; color: #64748b; font-weight: 600; font-size: 0.75rem; padding: 6px 8px; transition: all 0.3s; background: transparent !important; }
            .mobile-sub-nav a:not(.nav-logo):hover { color: var(--blue); }
            .mobile-sub-nav a.active { color: var(--blue) !important; font-weight: 800; }
            .m-dropdown .dropdown-content { top: auto; bottom: 50px; right: -5px; }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="/" class="nav-logo">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            홈
        </a>
        <div class="nav-links">
            <a href="/calendar" class="active">캘린더</a>
            <a href="/ranking">랭킹</a>
            <a href="/strategy">가이드</a>
            <div class="dropdown">
                <button class="dropbtn" onclick="toggleDesktopMenu(event)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="dropdown-content" id="desktopMenu">
                    <a href="/faq">FAQ</a>
                    <a href="/about">소개</a>
                    <a href="/privacy">약관</a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <form class="page-search" onsubmit="handleSearch(event)">
            <input type="text" id="searchInput" placeholder="종목명 또는 티커 검색..." required autocomplete="off">
            <button type="submit">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </form>

        <div class="calendar-hero">
            <h1>🗓️ 증시 캘린더</h1>
            <p>시장을 움직이는 핵심 우량주들의<br>배당락일 및 실적 발표 일정을 미리 확인하세요.</p>
        </div>

        <div class="tab-container">
            <div id="tab-div" class="tab-button active" onclick="switchCalTab('dividend')">💰 배당 일정</div>
            <div id="tab-earn" class="tab-button" onclick="switchCalTab('earning')">📈 실적 발표</div>
        </div>

        <div id="calendar-board" class="calendar-board">
            <div class="loading-spinner" style="padding-top: 80px;">일정을 불러오는 중입니다... ⏳</div>
        </div>
        
        <div class="main-footer">
            © 2026 SSABISSA. All rights reserved.<br>
            본 서비스의 증시 일정 데이터는 참고용이며, 해당 기업의<br>
            사정에 따라 사전 예고 없이 변경될 수 있습니다.
        </div>
    </div>

    <div id="diagnoseModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modalBody">
                <div class="loading-spinner">데이터를 불러오는 중입니다... ⏳</div>
            </div>
        </div>
    </div>

    <div class="mobile-sub-nav" style="display: none;">
        <a href="/" class="nav-logo">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            홈
        </a>
        <div class="nav-links">
            <a href="/calendar" class="active">캘린더</a>
            <a href="/ranking">랭킹</a>
            <div class="dropdown m-dropdown">
                <button class="dropbtn" onclick="toggleMobileMenu(event)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="dropdown-content" id="mobileMenu">
                    <a href="/strategy">가이드</a>
                    <a href="/faq">FAQ</a>
                    <a href="/about">소개</a>
                    <a href="/privacy">약관</a>
                </div>
            </div>
        </div>
    </div>

   <script>
    // ✅ 캘린더 데이터 로드 및 렌더링 로직 복구 완료 (기존 구조 완벽 유지)
    document.addEventListener("DOMContentLoaded", () => {
        fetch("/api/calendar/data")
            .then(r => r.json())
            .then(data => {
                window.calendarData = data;
                renderCalendar('dividend');
            })
            .catch(() => {
                document.getElementById('calendar-board').innerHTML = '<div style="text-align: center; padding: 40px 20px; color: var(--red); font-weight: 800;">데이터를 불러오는 중 오류가 발생했습니다.</div>';
            });
    });

    function switchCalTab(type) {
        document.getElementById('tab-div').classList.remove('active');
        document.getElementById('tab-earn').classList.remove('active');
        if (type === 'dividend') document.getElementById('tab-div').classList.add('active');
        else document.getElementById('tab-earn').classList.add('active');
        renderCalendar(type);
    }

    function renderCalendar(type) {
        const board = document.getElementById('calendar-board');
        const data = window.calendarData ? window.calendarData[type] : [];
        
        if (!data || data.length === 0) {
            board.innerHTML = `
                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; padding: 60px 20px; color: #94a3b8;">
                    <div style="font-size: 2rem; margin-bottom: 12px;">📭</div>
                    <div style="font-weight: 700; font-size: 0.95rem;">예정된 우량주 일정이 없습니다.</div>
                </div>`;
            return;
        }

        let html = '';
        data.forEach(item => {
            // 백엔드에서 yy.mm.dd 형식으로, 텍스트(배당락/실적발표) 제거된 상태로 넘어오므로 그대로 출력합니다.
            // 💡 클릭 시 종목 모달을 열도록 onclick 이벤트 추가
            const tickerMatch = item.title.match(/\[(.*?)\]/);
            const tickerStr = tickerMatch ? tickerMatch[1] : '';
            html += `
                <div class="event-item" onclick="openModal('${tickerStr}')">
                    <div class="event-date">${item.date}</div>
                    <div class="event-title">${item.title}</div>
                </div>`;
        });
        board.innerHTML = html;
    }

    function toggleDesktopMenu(e) {
        e.preventDefault();
        document.getElementById("desktopMenu").classList.toggle("show");
        document.getElementById("mobileMenu").classList.remove("show");
    }
    function toggleMobileMenu(e) {
        e.preventDefault();
        document.getElementById("mobileMenu").classList.toggle("show");
        document.getElementById("desktopMenu").classList.remove("show");
    }

    // ✅ 진단 모달창 스크립트 복구 완료
    function handleSearch(e) {
        e.preventDefault(); 
        const query = document.getElementById('searchInput').value.trim();
        if(!query) return;
        openModal(query);
    }

    function openModal(ticker) {
        if(!ticker) return;
        const modal = document.getElementById('diagnoseModal');
        const body = document.getElementById('modalBody');
        modal.style.display = 'flex';
        body.innerHTML = '<div class="loading-spinner">진단 중입니다... ⏳</div>';

        fetch(`/api/diagnose/${ticker}`)
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    body.innerHTML = `<div style="text-align:center; padding: 30px; color: var(--red); font-weight:800;">${data.error}</div>`;
                    return;
                }
                
                let reasonsHtml = '';
                if (data.reasons && data.reasons.length > 0) {
                    data.reasons.forEach(r => {
                        let color = 'var(--text-main)';
                        if(r.startsWith('+')) color = 'var(--red)';
                        if(r.startsWith('-')) color = 'var(--blue)';
                        reasonsHtml += `<li class="m-reason-item" style="color:${color}">${r}</li>`;
                    });
                } else {
                    reasonsHtml = `<li class="m-reason-item" style="color: #94a3b8; text-align:center;">특이 평가 항목이 없습니다.</li>`;
                }

                let changeHtml = '';
                if (data.score_change > 0) {
                    changeHtml = `<span class="change-up">▲ ${data.score_change}</span>`;
                } else if (data.score_change < 0) {
                    changeHtml = `<span class="change-down">▼ ${data.score_change * -1}</span>`;
                } else {
                    changeHtml = `<span>-</span>`;
                }

                body.innerHTML = `
                    <div class="m-header">
                        <div class="m-name">${data.name} <span style="font-size:0.8rem; color:#868e96; font-weight:600;">${data.ticker}</span></div>
                        <div class="m-price">${data.current_price}</div>
                    </div>
                    <div class="m-score-circle" style="background-color: ${data.color};">${data.score}</div>
                    <div style="display:flex; justify-content:center; margin-bottom:16px;">
                        <div class="score-change">어제 대비 ${changeHtml}</div>
                    </div>
                    <div class="m-brief">${data.brief}</div>
                    <div class="m-curation">🤖 ${data.curation_reason}</div>
                    <ul class="m-reason-list">${reasonsHtml}</ul>
                    <a href="/?ticker=${data.ticker}" class="m-btn-detail">📊 전체 차트 및 주주 커뮤니티 보기</a>
                `;
            })
            .catch(err => {
                body.innerHTML = `<div style="text-align:center; padding: 30px; color: var(--red); font-weight:800;">통신 오류가 발생했습니다.</div>`;
            });
    }

    function closeModal() { document.getElementById('diagnoseModal').style.display = 'none'; }
    
    // ✅ 외부 클릭 시 햄버거 메뉴 및 모달 닫기
    window.onclick = function(event) { 
        if (!event.target.closest('.dropbtn')) {
            var dropdowns = document.getElementsByClassName("dropdown-content");
            for (var i = 0; i < dropdowns.length; i++) {
                var openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('show')) openDropdown.classList.remove('show');
            }
        }
        if (event.target == document.getElementById('diagnoseModal')) closeModal(); 
    }
   </script>
</body>
</html>
