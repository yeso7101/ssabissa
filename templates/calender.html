<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>싸비싸 캘린더</title>
    <style>
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; }
        .tab-btn.active { background: #333; color: white; }
        .day { padding: 10px; border: 1px solid #ddd; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('dividend', this)">배당 캘린더</button>
        <button class="tab-btn" onclick="showTab('earning', this)">어닝 캘린더</button>
    </div>
    <div id="calendar-grid"></div>

    <script>
        let cachedData = { dividend: [], earning: [] };

        async function fetchCalendarData() {
            const res = await fetch('/api/calendar/data');
            cachedData = await res.json();
            showTab('dividend', document.querySelector('.tab-btn'));
        }

        function showTab(type, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            cachedData[type].forEach(item => {
                grid.innerHTML += `<div class="day"><strong>${item.date}</strong> - ${item.title}</div>`;
            });
        }

        window.onload = fetchCalendarData;
    </script>
</body>
</html>
